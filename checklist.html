<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiduciary Literacy Checklist | Kelly Legacy Institute</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--bg:#050A14;--panel:rgba(15,23,35,0.88);--gold:#D4AF37;--border:rgba(210,180,100,0.25);--text:#F3F6FC;--text-soft:#C9D3E6;--muted:#8A99B4;}
    body{background:radial-gradient(circle at top left,#0E1727,var(--bg) 75%);color:var(--text);font-family:'Inter',sans-serif;line-height:1.6;}
    .shell{width:min(1200px,92%);margin:auto;padding:2rem 0;}
    header{position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);background:rgba(5,10,20,0.82);border-bottom:1px solid var(--border);}
    .nav{display:flex;justify-content:space-between;align-items:center;gap:20px;padding:18px 0;flex-wrap:wrap;}
    .brand h1{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.45rem;}.brand p{font-family:'Roboto Mono',monospace;font-size:0.7rem;color:var(--muted);}
    .nav-links{display:flex;gap:18px;}.nav-links a{text-decoration:none;color:var(--text-soft);font-family:'Roboto Mono',monospace;font-size:0.72rem;letter-spacing:1px;}
    .nav-links a:hover{color:var(--gold);}
    .policy-card{background:var(--panel);border:1px solid var(--border);border-radius:30px;padding:42px;margin:40px 0;}
    .eyebrow{display:inline-block;padding:6px 16px;border-radius:60px;border:1px solid var(--border);background:rgba(212,175,55,0.12);color:var(--gold);font-family:'Roboto Mono',monospace;font-size:0.7rem;letter-spacing:1.3px;margin-bottom:24px;}
    h3{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);margin-bottom:10px;}
    .policy-meta{color:var(--muted);font-size:0.85rem;margin-bottom:26px;}
    h4{color:var(--gold);margin:28px 0 10px;font-size:1rem;}
    p,li{color:var(--text-soft);}
    .checklist-item{
      display:flex;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
      cursor:pointer;
    }
    .checklist-item input{
      margin-top:4px;
      width:18px;
      height:18px;
      accent-color:var(--gold);
      cursor:pointer;
    }
    .checklist-item label{
      flex:1;
      cursor:pointer;
      color:var(--text-soft);
      line-height:1.5;
    }
    .score-area{
      background:rgba(0,0,0,0.3);
      border-radius:20px;
      padding:12px 20px;
      margin-top:24px;
      display:inline-block;
      font-family:'Roboto Mono',monospace;
      font-size:0.85rem;
      border:1px solid var(--border);
    }
    .btn-group{display:flex;gap:16px;flex-wrap:wrap;margin-top:20px;}
    .btn-secondary{
      background:transparent;
      border:1px solid var(--border);
      color:var(--text-soft);
      padding:8px 18px;
      border-radius:60px;
      cursor:pointer;
      font-family:'Roboto Mono',monospace;
      font-size:0.7rem;
      transition:0.2s;
    }
    .btn-secondary:hover{
      border-color:var(--gold);
      color:var(--gold);
    }
    .print-btn{background:var(--gold-soft);border:1px solid var(--gold);color:var(--gold);padding:8px 18px;border-radius:60px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-family:'Roboto Mono',monospace;font-size:0.7rem;}
    .print-btn:hover{background:rgba(212,175,55,0.25);}
    .trust-badge{display:inline-block;font-family:'Roboto Mono',monospace;font-size:0.65rem;background:rgba(212,175,55,0.08);border:1px solid var(--border);border-radius:40px;padding:4px 12px;color:var(--gold);}
    footer{border-top:1px solid var(--border);background:#03070f;padding:42px 0;margin-top:40px;}
    .footer-wrap{display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap;color:var(--muted);font-size:0.78rem;}
    .footer-links a{color:var(--muted);text-decoration:none;margin-right:18px;}.footer-links a:hover{color:var(--gold);}
    @media(max-width:900px){.nav{justify-content:center;text-align:center;}.nav-links{justify-content:center;}}
    @media print{
      body{background:white;color:black;}
      .policy-card{background:white;border:1px solid #ccc;box-shadow:none;}
      header,footer,.print-btn,.btn-group,.nav-links,.eyebrow{display:none;}
      .trust-badge{color:#D4AF37;border:1px solid #D4AF37;}
