<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KLAT Access Terminal</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
  body {
    background:#061018;
    color:#e6f1ff;
    font-family: Arial, sans-serif;
    text-align:center;
    padding:40px;
  }

  button {
    padding:14px 22px;
    margin:10px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-weight:bold;
    background:#0ff;
    color:#000;
  }

  .card {
    margin-top:30px;
    padding:20px;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
  }

  .status {
    margin-top:20px;
    font-size:14px;
    color:#7fdfff;
  }
</style>
</head>

<body>

<h1>KLAT ACCESS TERMINAL</h1>

<button onclick="connectWallet()">CONNECT WALLET</button>

<div class="card">
  <p><strong>Wallet:</strong> <span id="wallet">-</span></p>
  <p><strong>Network:</strong> <span id="network">-</span></p>
  <p><strong>Status:</strong> <span id="status">Awaiting</span></p>
</div>

<div class="status" id="debug"></div>

<!-- ✅ LOAD ETHERS FIRST (RELIABLE CDN) -->
<script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<!-- ✅ YOUR SCRIPT -->
<script>
  // SAFETY CHECK
  if (typeof ethers === "undefined") {
    alert("Ethers failed to load. Please refresh the page.");
  }

  const CONTRACT_ADDRESS = "0x0eC422119173558541BED4BF2f0Ef4807D66A4f4";
  const POLYGON_CHAIN_ID_HEX = "0x89";

  const ABI = [
    "function balanceOf(address) view returns (uint256)",
    "function decimals() view returns (uint8)"
  ];

  const connectBtn = document.querySelector("[data-connect-wallet]");
  const walletDisplay = document.getElementById("walletAddressDisplay");
  const networkDisplay = document.getElementById("networkDisplay");
  const statusDisplay = document.getElementById("holderDisplay");

  connectBtn.addEventListener("click", async () => {
    try {
      if (!window.ethereum) {
        alert("No wallet detected. Open in MetaMask browser.");
        return;
      }

      const accounts = await window.ethereum.request({
        method: "eth_requestAccounts"
      });

      const account = accounts[0];

      walletDisplay.textContent =
        account.slice(0, 6) + "..." + account.slice(-4);

      // SWITCH TO POLYGON
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: POLYGON_CHAIN_ID_HEX }]
      });

      networkDisplay.textContent = "Polygon Mainnet";

      // CONNECT PROVIDER
      const provider = new ethers.providers.Web3Provider(window.ethereum);
      const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);

      const balance = await contract.balanceOf(account);
      const decimals = await contract.decimals();

      const formatted = ethers.utils.formatUnits(balance, decimals);

      if (Number(formatted) > 0) {
        statusDisplay.textContent = "VERIFIED HOLDER";
      } else {
        statusDisplay.textContent = "NO TOKEN DETECTED";
      }

    } catch (err) {
      console.error(err);
      statusDisplay.textContent = "READ FAILED";
    }
  });
</script>
