<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KLAT Access Terminal</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
  body {
    background:#061018;
    color:#e6f1ff;
    font-family: Arial, sans-serif;
    text-align:center;
    padding:40px;
  }

  button {
    padding:14px 22px;
    margin:10px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-weight:bold;
    background:#0ff;
    color:#000;
  }

  .card {
    margin-top:30px;
    padding:20px;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
  }

  .status {
    margin-top:20px;
    font-size:14px;
    color:#7fdfff;
  }
</style>
</head>

<body>

<h1>KLAT ACCESS TERMINAL</h1>

<button onclick="connectWallet()">CONNECT WALLET</button>

<div class="card">
  <p><strong>Wallet:</strong> <span id="wallet">-</span></p>
  <p><strong>Network:</strong> <span id="network">-</span></p>
  <p><strong>Status:</strong> <span id="status">Awaiting</span></p>
</div>

<div class="status" id="debug"></div>

<script>
const CONTRACT = "0x0eC422119173558541BED4BF2f0Ef4807D66A4f4";
const POLYGON = "0x89";

function log(msg){
  console.log(msg);
  document.getElementById("debug").innerText = msg;
}

function short(addr){
  return addr.slice(0,6)+"..."+addr.slice(-4);
}

async function connectWallet(){

  if(!window.ethereum){
    alert("No wallet detected");
    return;
  }

  try{
    const provider = new ethers.providers.Web3Provider(window.ethereum);

    const accounts = await window.ethereum.request({
      method:"eth_requestAccounts"
    });

    const account = accounts[0];

    document.getElementById("wallet").innerText = short(account);

    // Ensure Polygon
    let chainId = await window.ethereum.request({method:"eth_chainId"});

    if(chainId !== POLYGON){
      await window.ethereum.request({
        method:"wallet_switchEthereumChain",
        params:[{chainId:POLYGON}]
      });
    }

    document.getElementById("network").innerText = "Polygon";

    log("Reading contract...");

    const contract = new ethers.Contract(
      CONTRACT,
      ["function balanceOf(address) view returns (uint256)"],
      provider
    );

    const balance = await contract.balanceOf(account);

    const formatted = Number(ethers.utils.formatUnits(balance,18));

    log("Balance raw: " + balance.toString());

    if(formatted > 0){
      document.getElementById("status").innerText =
        "VERIFIED HOLDER (" + formatted.toFixed(2) + " KLAT)";
    } else {
      document.getElementById("status").innerText =
        "CONNECTED — NO KLAT";
    }

  }catch(e){
    console.error(e);
    document.getElementById("status").innerText = "READ FAILED";
    log("ERROR: " + (e.message || e));
  }
}
</script>

</body>
</html>
