<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Kelly Legacy Estates Living Trust | Kelly Legacy Institute</title>

  <meta name="description" content="Kelly Legacy Institute provides structured educational instruction in fiduciary literacy, trust administration, procedural discipline, institutional governance, and record accountability under the governance of Kelly Legacy Estates Living Trust." />
  <meta name="theme-color" content="#0A0F1A" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#050A14;
      --panel:rgba(15,23,35,0.88);
      --gold:#D4AF37;
      --gold-soft:rgba(212,175,55,0.12);
      --border:rgba(210,180,100,0.25);
      --text:#F3F6FC;
      --text-soft:#C9D3E6;
      --muted:#8A99B4;
      --shadow:0 24px 48px -20px rgba(0,0,0,0.45),0 0 0 1px rgba(212,175,55,0.12) inset;
    }
    body{
      background:radial-gradient(circle at top left,#0E1727,var(--bg) 75%);
      color:var(--text);
      font-family:'Inter',sans-serif;
      line-height:1.6;
    }
    .shell{width:min(1200px,92%);margin:auto;}
    header{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:blur(12px);
      background:rgba(5,10,20,0.82);
      border-bottom:1px solid var(--border);
    }
    .nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      padding:18px 0;
      flex-wrap:wrap;
    }
    .brand h1{
      font-family:'Playfair Display',serif;
      color:var(--gold);
      font-size:1.45rem;
      font-weight:600;
    }
    .brand p{
      font-family:'Roboto Mono',monospace;
      font-size:0.7rem;
      color:var(--muted);
      letter-spacing:1px;
    }
    .nav-links,.footer-links{display:flex;gap:18px;flex-wrap:wrap;}
    .nav-links a,.footer-links a{
      text-decoration:none;
      color:var(--text-soft);
      font-family:'Roboto Mono',monospace;
      font-size:0.72rem;
      letter-spacing:1px;
      transition:0.2s ease;
    }
    .nav-links a:hover,.footer-links a:hover{color:var(--gold);}
    section{padding:72px 0;}
    .hero{
      display:grid;
      grid-template-columns:1.2fr 0.9fr;
      gap:48px;
      align-items:center;
      padding:90px 0;
    }
    .eyebrow{
      display:inline-block;
      padding:6px 16px;
      border-radius:60px;
      border:1px solid var(--border);
      background:var(--gold-soft);
      color:var(--gold);
      font-family:'Roboto Mono',monospace;
      font-size:0.7rem;
      letter-spacing:1.3px;
      margin-bottom:24px;
    }
    h2{
      font-family:'Playfair Display',serif;
      font-size:clamp(2.5rem,5vw,4.2rem);
      line-height:1.1;
      font-weight:600;
      letter-spacing:-0.03em;
    }
    .lead{
      margin:24px 0 30px;
      color:var(--text-soft);
      max-width:620px;
      font-size:1.08rem;
    }
    .btn-group{display:flex;gap:16px;flex-wrap:wrap;}
    .btn{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:12px 24px;
      border-radius:60px;
      text-decoration:none;
      border:1px solid var(--border);
      color:white;
      font-family:'Roboto Mono',monospace;
      font-size:0.72rem;
      letter-spacing:1px;
      transition:0.2s ease;
    }
    .btn-primary{background:var(--gold);color:#08111d;border-color:var(--gold);font-weight:600;}
    .btn-primary:hover{background:#c79d28;transform:translateY(-2px);}
    .btn-outline:hover{background:rgba(212,175,55,0.08);border-color:var(--gold);}
    .hero-card,.card,.iframe-card,.governance-card,.disclaimer{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:30px;
      box-shadow:var(--shadow);
    }
    .hero-card{padding:30px;}
    .hero-card h4{color:var(--gold);margin-bottom:18px;}
    .principles{list-style:none;display:grid;gap:16px;}
    .principles li{display:flex;gap:12px;border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:14px;}
    .principles i{color:var(--gold);margin-top:4px;}
    .section-head{max-width:760px;margin-bottom:48px;}
    .section-head h3{
      font-family:'Playfair Display',serif;
      font-size:2rem;
      margin-bottom:14px;
    }
    .section-head p{color:var(--muted);}
    .grid-3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:28px;
    }
    .card{padding:28px;}
    .card i{color:var(--gold);font-size:2rem;margin-bottom:16px;}
    .card h4{margin-bottom:12px;}
    .card p{color:var(--text-soft);}
    .platform-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 16px;
      border-radius:60px;
      border:1px solid var(--border);
      background:rgba(0,0,0,0.3);
      margin-top:22px;
      text-decoration:none;
      color:var(--text);
      font-family:'Roboto Mono',monospace;
      font-size:0.7rem;
    }
    .governance-card{text-align:center;padding:48px 36px;}
    .governance-card p{max-width:780px;margin:0 auto 28px;color:var(--text-soft);}
    .iframe-card{overflow:hidden;}
    .iframe-top{padding:40px;}
    iframe{width:100%;border:none;background:white;display:block;}
    .disclaimer{
      padding:28px;
      border-left:3px solid var(--gold);
      color:var(--muted);
      font-size:0.82rem;
    }
    footer{
      border-top:1px solid var(--border);
      background:#03070f;
      padding:42px 0;
      margin-top:80px;
    }
    .footer-wrap{
      display:flex;
      justify-content:space-between;
      gap:24px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:0.78rem;
    }
    @media(max-width:900px){
      .hero,.grid-3{grid-template-columns:1fr;}
      .nav{justify-content:center;text-align:center;}
      .nav-links{justify-content:center;}
    }
  </style>
</head>

<body>

<header>
  <div class="shell">
    <div class="nav">
      <div class="brand">
        <h1>Kelly Legacy Estates Living Trust</h1>
        <p>GOVERNANCE · TRUST ADMINISTRATION · FIDUCIARY EDUCATION</p>
      </div>
      <nav class="nav-links">
        <a href="#about">ABOUT</a>
        <a href="#programs">PROGRAMS</a>
        <a href="#platform">PLATFORM</a>
        <a href="#apply">APPLY</a>
        <a href="#governance">GOVERNANCE</a>
